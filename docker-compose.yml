services:
  postgres:
    image: postgres:16-alpine
    container_name: residuum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-residuum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-residuum}
      POSTGRES_DB: ${POSTGRES_DB:-residuum}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-residuum} -d ${POSTGRES_DB:-residuum}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: residuum-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-residuum}:${POSTGRES_PASSWORD:-residuum}@postgres:5432/${POSTGRES_DB:-residuum}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao}
      PORT: ${API_PORT:-8080}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"

volumes:
  postgres_data:
